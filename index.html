<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10 Full-Width Color Bars</title>
  <style>
    .color-bar {
      width: 100%;
      height: 300px;
    }
    .red   { background: red; }
    .orange{ background: orange; }
    .yellow{ background: yellow; }
    .green { background: green; }
    .blue  { background: blue; }
    .indigo{ background: indigo; }
    .violet{ background: violet; }
    .pink  { background: hotpink; }
    .teal  { background: teal; }
    .gray  { background: gray; }
  </style>
</head>
<body>
  <div class="color-bar red"></div>
  <div class="color-bar orange"></div>
  <div class="color-bar yellow"></div>
  <div class="color-bar green"></div>
  <div class="color-bar blue"></div>
  <div class="color-bar indigo"></div>
  <div class="color-bar violet"></div>
  <div class="color-bar pink"></div>
  <div class="color-bar teal"></div>
  <div class="color-bar gray"></div>
</body>
</html>
